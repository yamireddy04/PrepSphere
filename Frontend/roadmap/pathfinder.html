<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrepMaster | Learning Pathfinder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #020617; 
      color: #cbd5e1; 
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px; 
    }
    .dark-panel {
      background-color: #0f172a; 
      border: 1px solid #1e293b; 
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
    }
    .roadmap-list { position: relative; }
    .roadmap-list::before {
      content: ''; position: absolute; left: 18px; top: 18px; bottom: 0;
      width: 2px; background: #1e293b; 
    }
    .roadmap-step { position: relative; z-index: 10; display: flex; align-items: start; gap: 16px; margin-bottom: 24px; }
    .step-dot { 
      width: 38px; height: 38px; flex-shrink: 0; 
      background: #0f172a; 
      border: 2px solid #2563eb; 
      border-radius: 50%; 
      color: #2563eb; 
      font-weight: 800; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .minimal-input {
      background: none; 
      border: 1px solid #1e293b;
      padding: 12px 18px; border-radius: 10px;
      transition: all 0.2s ease;
      font-size: 1rem;
    }
    .minimal-input:focus { border-color: #3b82f6; outline: none; }
    .brand-btn {
      background-color: #2563eb; 
      color: white; 
      padding: 12px 24px; border-radius: 10px;
      font-weight: 700; transition: all 0.2s;
    }
    .brand-btn:hover { background-color: #1d4ed8; transform: translateY(-1px); }
    .brand-btn:active { transform: translateY(0px); }
    .brand-btn:disabled { opacity: 0.5; background-color: #475569; }
    .nav-btn {
      background-color: #1e293b;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s;
      border: 1px solid #334155;
    }
    .nav-btn:hover { background-color: #334155; border-color: #475569; }
    .small-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; border-radius: 4px; padding: 2px 6px; }
    .tag-free { background-color: rgba(16, 185, 129, 0.1); color: #10b981; } 
    .practice-box { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; font-size: 0.875rem; color: #e2e8f0;}
    .loader {
      border: 3px solid #1e293b; border-top: 3px solid #2563eb;
      border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="p-6 md:p-12">

  <div class="max-w-4xl mx-auto">
    <header class="text-center mb-16">
      <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight mb-3">Pathfinder</h1>
      <p class="text-lg text-slate-500 max-w-2xl mx-auto">Don't see your path? Use this to generate a roadmap that's actually main character energy. 🚀</p>
    </header>

    <section class="mb-16 dark-panel p-8">
      <div class="grid grid-cols-1 md:grid-cols-[1fr,auto] gap-4">
        <input type="text" id="roleInput" placeholder="e.g. Prompt Engineering, AI/ML, Platform Engineer..." class="minimal-input w-full text-white">
        <button id="genBtn" onclick="generatePath()" class="brand-btn flex items-center justify-center gap-2">
          Generate Roadmap
        </button>
      </div>
    </section>

    <div id="loading" class="hidden text-center py-20">
      <div class="loader inline-block mb-3"></div>
      <p class="text-slate-600 font-medium">Architecting your lore...</p>
    </div>

    <main id="roadmapContainer" class="hidden space-y-12"></main>
  </div>

  <nav class="fixed bottom-0 left-0 w-full bg-slate-950/80 backdrop-blur-md border-t border-slate-800 p-4 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <button onclick="window.location.href='conventional.html'" class="nav-btn">
        ← Previous
      </button>
      <span class="text-slate-600 text-xs font-bold uppercase tracking-widest hidden sm:block">Pathfinder Module</span>
      <button onclick="window.location.href='../resume/resume.html'" class="nav-btn bg-blue-600 border-blue-500 hover:bg-blue-500">
        Next →
      </button>
    </div>
  </nav>

  <script>
    async function generatePath() {
      const role = document.getElementById('roleInput').value.trim();
      if (!role) return;

      const genBtn = document.getElementById('genBtn');
      const loader = document.getElementById('loading');
      const container = document.getElementById('roadmapContainer');

      genBtn.disabled = true;
      loader.classList.remove('hidden');
      container.classList.add('hidden');
      container.innerHTML = ''; 

      try {
        const response = await fetch('https://prepsphere-o7wh.onrender.com/api/roadmap', { 
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role })
        });
        
        if (!response.ok) throw new Error("Server error");
        const data = await response.json();
        renderRoadmapHTML(data);
        
      } catch (error) {
        console.error("Pathfinder Error:", error);
        alert("Failed to reach the AI. Check if your Render backend is awake!");
      } finally {
        genBtn.disabled = false;
        loader.classList.add('hidden');
      }
    }

    function renderRoadmapHTML(data) {
      const container = document.getElementById('roadmapContainer');
      let html = `<h2 class="text-2xl font-bold text-white mb-12">Roadmap for ${data.role}</h2>`;

      html += '<section class="roadmap-list space-y-10">';
      data.roadmapSteps.forEach((step, index) => {
        html += `
          <div class="roadmap-step">
            <div class="step-dot">${index + 1}</div>
            <div class="flex-grow dark-panel p-6">
              <h3 class="text-xl font-bold text-white">${step.title}</h3>
              <p class="text-slate-500 mb-6">${step.subtitle}</p>
              <div class="grid md:grid-cols-3 gap-8">
                <div>
                  <h4 class="text-xs font-extrabold text-blue-400 uppercase tracking-wider mb-3">Topics</h4>
                  <ul class="text-sm space-y-2">
                    ${step.topics.map(t => `<li class="flex items-center gap-2"><span class="w-1.5 h-1.5 bg-slate-700 rounded-full"></span> ${t}</li>`).join('')}
                  </ul>
                </div>
                <div>
                  <h4 class="text-xs font-extrabold text-emerald-400 uppercase tracking-wider mb-3">Resources</h4>
                  <div class="space-y-3">
                    ${step.resources.map(r => `
                      <div class="text-sm">
                        <span class="small-tag tag-free">${r.type}</span>
                        <p class="font-semibold text-slate-100 mt-1">${r.name}</p>
                        <p class="text-slate-600 text-xs">${r.context}</p>
                      </div>
                    `).join('')}
                  </div>
                </div>
                <div>
                  <h4 class="text-xs font-extrabold text-amber-400 uppercase tracking-wider mb-3">Practice</h4>
                  <div class="space-y-2.5">
                    ${step.practice.map((p, pIndex) => `
                      <div class="practice-box text-sm">
                        <span class="text-amber-500 font-bold mr-2">${pIndex + 1}</span> ${p}
                      </div>
                    `).join('')}
                  </div>
                </div>
              </div>
            </div>
          </div>`;
      });
      html += '</section>';

      html += `
        <section class="mt-16 pt-12 border-t border-slate-800">
          <h2 class="text-2xl font-bold text-white mb-8">Capstone Projects</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            ${data.projectIdeas.map(p => `
              <div class="dark-panel p-6">
                <h4 class="text-lg font-bold text-slate-100 mb-2">${p.title}</h4>
                <p class="text-sm text-slate-400 mb-4">${p.description}</p>
                <div class="flex flex-wrap gap-2">
                   ${p.stack.map(s => `<span class="small-tag bg-slate-800 text-slate-300 font-medium">${s}</span>`).join('')}
                </div>
              </div>`).join('')}
          </div>
        </section>`;

      container.innerHTML = html;
      container.classList.remove('hidden');
      window.scrollTo({ top: container.offsetTop - 100, behavior: 'smooth' });
    }
  </script>
</body>
</html>
