<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrepSphere | Login</title>
<link rel="icon" type="image/jpeg" href="./images/logo.jpeg">
<link rel="stylesheet" href="shared/mobile.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{height:100vh;background:#f1f5f9;display:flex;align-items:center;justify-content:center;}
.container{width:1000px;height:420px;background:white;display:flex;border-radius:24px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,0.08);}
.image-side{flex:1;background:#e0ecff;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.image-side img{width: 100%;height:150%;object-fit:contain;}
.form-side{flex:1;padding:80px;display:flex;flex-direction:column;justify-content:center;}
.brand{font-size:42px;font-weight:700;background:linear-gradient(270deg,#1e3a8a,#2563eb,#3b82f6,#60a5fa);background-size:600% 600%;background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:20px;min-height:55px;letter-spacing:1px;transition:all 0.6s ease;animation:gradientShift 6s ease infinite;position:relative;}
.brand::after{content:"";width:6px;height:6px;background:#2563eb;border-radius:50%;display:inline-block;margin-left:8px;animation:blink 1s infinite;vertical-align:middle;}
@keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
h2{margin-bottom:40px;color:#1e293b;font-weight:600;}
input{width:100%;padding:15px;margin-bottom:20px;border-radius:12px;border:1px solid #e2e8f0;font-size:14px;transition:0.3s;}
input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.15);}
button{width:100%;padding:15px;border:none;border-radius:12px;background:#2563eb;color:white;font-weight:600;cursor:pointer;transition:0.3s;opacity:0.6;}
button.enabled{opacity:1;}
button:hover.enabled{background:#1d4ed8;}
.link{margin-top:20px;font-size:14px;}
.link a{color:#2563eb;text-decoration:none;font-weight:500;}
@media (max-width: 768px) {
  .container {
    width: 95vw !important;
    height: auto !important;
    flex-direction: column !important;
  }
  .left {
    width: 100% !important;
    padding: 32px 24px !important;
  }
  .right {
    display: none !important;
  }
}
</style>
</head>
<body>
<div class="container">
<div class="image-side"><img src="images/login.jpeg"></div>
<div class="form-side">
<div class="brand" id="brandText"></div>
<h2>Welcome Back</h2>
<form id="loginForm">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button type="submit" id="loginBtn" disabled>Login</button>
</form>
<div class="link">Don't have an account? <a href="register.html">Register</a></div>
</div>
</div>

<script type="module">
// We use a relative path here to ensure the browser finds it inside your Frontend folder
import { API_BASE_URL } from './js/config.js';

const text = "PrepSphere";
const el = document.getElementById("brandText");
let index = 0;

function type() {
    if (el && index < text.length) {
        el.textContent += text.charAt(index);
        index++;
        setTimeout(type, 120);
    } else if (el) {
        setTimeout(() => {
            el.style.opacity = "0";
            el.style.transform = "scale(0.96)";
            setTimeout(() => {
                el.textContent = "";
                el.style.opacity = "1";
                el.style.transform = "scale(1)";
                index = 0;
                type();
            }, 800);
        }, 30000);
    }
}

// Validation logic
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");

function validate() {
    if (emailInput.value.trim() !== "" && passwordInput.value.trim() !== "") {
        loginBtn.disabled = false;
        loginBtn.classList.add("enabled");
    } else {
        loginBtn.disabled = true;
        loginBtn.classList.remove("enabled");
    }
}

emailInput.addEventListener("input", validate);
passwordInput.addEventListener("input", validate);

// Login Logic
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
        const res = await fetch(`${API_BASE_URL}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: emailInput.value, password: passwordInput.value }),
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem("token", data.token);
            window.location.href = "index/index.html";
        } else {
            alert(data.message || "Login failed");
        }
    } catch (err) {
    console.error("Login error:", err);
    alert("Connection failed. The server may be waking up (Render free tier). Please wait 30 seconds and try again.");
}
});

// Initialize animation
type();
</script>
</body>
</html>
